# =====================================================================
# ~/.tmux.conf
# =====================================================================

# Fix colors ===========================================================
# Use tmux-256color for maximum compatibility (SSH-safe)
set -g default-terminal "tmux-256color"

# Enable true color (24-bit) where possible
set -ga terminal-overrides ",*:Tc"

# System clipboard integration ========================================
# Wayland (wl-copy)
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"

# Windows / tabs =======================================================
set -g base-index 1

# Automatically set window title
set -g automatic-rename on
set -g set-titles on

set -g status-keys vi
set -g history-limit 10000

# Key bindings =========================================================
setw -g mode-keys vi
setw -g mouse on

# Pane resizing
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Ctrl + hjkl (no prefix)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Ctrl + arrows (no prefix)
bind -n C-Left  select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up    select-pane -U
bind -n C-Down  select-pane -D

# Shift + arrows → switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# No delay for ESC
set -sg escape-time 0

# New windows / splits keep current directory
bind c  new-window -c "#{pane_current_path}"
bind s  split-window -v -c "#{pane_current_path}"
bind v  split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind %  split-window -h -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Theme ================================================================
set -g status-interval 60
set -g status-left-length 30
set -g status-left '#[fg=green](#S) #(whoami) '
set -g status-right '#[fg=white]%H:%M#[default]'

# Pane borders
set -g pane-active-border-style "fg=brightblue,bold"
set -g pane-border-style "fg=darkgray"

# Coding agents monitoring =============================================
# Activity = agent producing output
# Silence  = agent likely finished

setw -g monitor-activity on
set -g visual-activity off
setw -g monitor-silence 30

# Status bar base
set -g status-style bg=black,fg=white

# Normal windows (dim)
set -g window-status-style 'fg=colour250,bg=black'

# Current window (YOU ARE HERE)
set -g window-status-current-style 'bg=green,fg=black,bold'

# Window formats (text only; style handles colors)
set -g window-status-format         ' #I:#W#{?window_activity_flag,*,}#{?window_silence_flag,✓,} '
set -g window-status-current-format ' #I:#W#{?window_activity_flag,*,}#{?window_silence_flag,✓,} '

# State-based coloring
set -g window-status-activity-style 'fg=yellow,bg=black'
set -g window-status-silence-style  'fg=black,bg=green'
set -g window-status-bell-style     'fg=white,bg=red'

# Do not auto-jump or popup on activity/bell
set -g activity-action none
set -g bell-action none

