# =====================================================================
# ~/.tmux.conf
# =====================================================================

# Fix colors ===========================================================
# Use tmux-256color for maximum compatibility (SSH-safe)
set -g default-terminal "tmux-256color"

# Enable true color (24-bit) where possible
set -ga terminal-overrides ",*:Tc"

# System clipboard integration ========================================
# Wayland (wl-copy)
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
# X11 (xclip)
# bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in"
# WSL (clip.exe)
# bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"

# Windows / tabs =======================================================
set -g base-index 1

# Automatically set window title
set -g automatic-rename on
set -g set-titles on

set -g status-keys vi
set -g history-limit 10000

# Key bindings =========================================================
setw -g mode-keys vi
setw -g mouse on

# Pane resizing
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Ctrl + hjkl (no prefix)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Ctrl + arrows (no prefix)
# bind -n C-Left  select-pane -L
# bind -n C-Right select-pane -R
# bind -n C-Up    select-pane -U
# bind -n C-Down  select-pane -D

# Shift + arrows → switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# No delay for ESC
set -sg escape-time 0

# New windows / splits keep current directory
bind c  new-window -c "#{pane_current_path}"
bind s  split-window -v -c "#{pane_current_path}"
bind v  split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind %  split-window -h -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Tell tmux to send focus-in/focus-out escape sequences to programs running
# inside tmux panes when the terminal window gains or loses focus
set -g focus-events on

# Theme ================================================================
set -g status-interval 60
set -g status-left-length 30
set -g status-left '#[fg=green](#S) #(whoami) '
set -g status-right '#[fg=white]%H:%M#[default]'

# Pane borders
set -g pane-active-border-style "fg=black,bold"
set -g pane-border-style "fg=lightgray"
set -g pane-border-indicators both
set -g pane-border-lines double

# Coding agents monitoring =============================================
# Activity = agent produced output (window_activity_flag = *)
# Silence  = agent silent for N seconds (window_silence_flag = ✓)

# Enable monitoring
setw -g monitor-activity on
set -g visual-activity off
setw -g monitor-silence 30

# Status bar base
set -g status-style bg=gray,fg=black

# Normal windows (idle)
set -g window-status-style 'fg=black,bg=gray'

# CURRENT window (YOU ARE HERE)
set -g window-status-current-style 'bg=green,fg=black,bold'

# ------------------------------------------------------------
# Window formats (logic lives HERE, not in *-style overrides)
# ------------------------------------------------------------

# Non-current windows:
# - blue if activity
# - dim otherwise
# - Z if zoomed, ✓ if silence
set -g window-status-format \
'#{?window_activity_flag,#[fg=blue],#[fg=blue]} #I:#W#{?window_zoomed_flag,Z,}#{?window_silence_flag,✓,} #[default]'


# Current window:
# - always green (style wins)
# - Z if zoomed, ✓ if silence
set -g window-status-current-format \
' #I:#W#{?window_zoomed_flag,Z,}#{?window_silence_flag,✓,} '

# ------------------------------------------------------------
# Disable global style overrides (IMPORTANT)
# ------------------------------------------------------------
set -gu window-status-activity-style
# set -gu window-status-silence-style

# Bell (optional)
set -g window-status-bell-style 'fg=white,bg=red'

# Do not auto-jump or popup on activity/bell
set -g activity-action none
set -g bell-action none
