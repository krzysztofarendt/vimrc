# =====================================================================
# Copy this file to:
# ~/.tmux.conf
# =====================================================================

# Fix colors ===========================================================
# Use tmux-256color for maximum compatibility (SSH-safe)
set -g default-terminal "tmux-256color"

# Enable true color (24-bit) where possible
set -ga terminal-overrides ",*:Tc"

# System clipboard integration ========================================
set -g  set-clipboard on

# Wayland (wl-copy)
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"

# X11 (xclip)
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in"

# WSL (clip.exe)
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"

# MacOS
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Windows / tabs =======================================================
set -g base-index 1

# Automatically set window title
set -g automatic-rename on
set -g set-titles on

set -g status-keys vi
set -g history-limit 10000

# Key bindings =========================================================
setw -g mode-keys vi
setw -g mouse on

# Distribute panes horizontally
bind = select-layout even-horizontal

# Pane resizing
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up resize-pane -U 5
bind -r Down resize-pane -D 5

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Ctrl + hjkl (no prefix)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Shift + arrows → switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# No delay for ESC
set -sg escape-time 0

# New windows / splits keep current directory
bind c  new-window -c "#{pane_current_path}"
bind s  split-window -v -c "#{pane_current_path}"
bind v  split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind %  split-window -h -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Tell tmux to send focus-in/focus-out escape sequences to programs running
# inside tmux panes when the terminal window gains or loses focus
set -g focus-events on

# Theme ================================================================
set -g status-interval 60
set -g status-left-length 30
set -g status-left '#[fg=red](#S) #(whoami) '

# Pane borders
set -g pane-active-border-style "fg=black,bold"
set -g pane-border-style "fg=lightgray"
set -g pane-border-indicators both
set -g pane-border-lines double

# Status bar base
set -g status-style bg=gray,fg=black

# Normal windows (idle)
set -g window-status-style 'fg=black,bg=gray'

# Current window
set -g window-status-current-style 'bg=lightgreen,fg=black,bold'
